set_timer:
  name: Set timer on/off times
  description: Update the on and/or off datetime of a PowerPilz Smart Timer.
  target:
    entity:
      integration: powerpilz_companion
      domain: switch
  fields:
    "on":
      name: On time
      description: ISO 8601 datetime (e.g. 2026-04-19T18:30:00). Omit to leave unchanged.
      required: false
      selector:
        text:
    "off":
      name: Off time
      description: ISO 8601 datetime. Omit to leave unchanged.
      required: false
      selector:
        text:
