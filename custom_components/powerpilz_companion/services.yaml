set_timer:
  name: Set timer on/off times
  description: >-
    Update the on and/or off datetime of a PowerPilz Smart Timer.
    For select-target timers, optionally also override which option
    is applied at each boundary for the next activation.
  target:
    entity:
      integration: powerpilz_companion
      domain: switch
  fields:
    "on":
      name: On time
      description: ISO 8601 datetime (e.g. 2026-04-19T18:30:00). Omit to leave unchanged, empty string to clear.
      required: false
      selector:
        text:
    "off":
      name: Off time
      description: ISO 8601 datetime. Omit to leave unchanged, empty string to clear.
      required: false
      selector:
        text:
    on_option:
      name: On option
      description: >-
        (select-target only) Which option to apply at the on-boundary.
        For Smart Schedule targets, pass the logical key (off/on/auto).
        For generic select/input_select targets, pass the display name.
        Omit to leave unchanged, empty string to clear.
      required: false
      selector:
        text:
    off_option:
      name: Off option
      description: >-
        (select-target only) Which option to apply at the off-boundary.
        Same conventions as on_option.
      required: false
      selector:
        text:

set_schedule_blocks:
  name: Set Smart Schedule weekly blocks
  description: >-
    Replace the weekly schedule blocks of a Smart Schedule helper. Used
    primarily by the PowerPilz Schedule card; you can also call it from
    automations to e.g. rotate between seasonal schedules.
  target:
    entity:
      integration: powerpilz_companion
      domain: select
  fields:
    blocks:
      name: Weekly blocks
      description: >-
        Dict keyed by weekday (`monday`…`sunday`); each value is a list
        of `{from, to, data?}` entries. Times are `HH:MM:SS` (24:00:00
        allowed as end-of-day). Existing blocks are replaced entirely.
      required: true
      selector:
        object:
