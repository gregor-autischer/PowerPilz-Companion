set_timer:
  name: Set timer on/off times
  description: >-
    Update the on and/or off datetime of a PowerPilz Smart Timer.
    For select-target timers, optionally also override which option
    is applied at each boundary for the next activation.
  target:
    entity:
      integration: powerpilz_companion
      domain: switch
  fields:
    "on":
      name: On time
      description: ISO 8601 datetime (e.g. 2026-04-19T18:30:00). Omit to leave unchanged, empty string to clear.
      required: false
      selector:
        text:
    "off":
      name: Off time
      description: ISO 8601 datetime. Omit to leave unchanged, empty string to clear.
      required: false
      selector:
        text:
    on_option:
      name: On option
      description: >-
        (select-target only) Which option to apply at the on-boundary.
        For Smart Schedule targets, pass the logical key (off/on/auto).
        For generic select/input_select targets, pass the display name.
        Omit to leave unchanged, empty string to clear.
      required: false
      selector:
        text:
    off_option:
      name: Off option
      description: >-
        (select-target only) Which option to apply at the off-boundary.
        Same conventions as on_option.
      required: false
      selector:
        text:

set_schedule_blocks:
  name: Set Smart Schedule weekly blocks
  description: >-
    Replace the weekly schedule blocks of a Smart Schedule helper. Used
    primarily by the PowerPilz Schedule card; you can also call it from
    automations to e.g. rotate between seasonal schedules.
  target:
    entity:
      integration: powerpilz_companion
      domain: select
  fields:
    blocks:
      name: Weekly blocks
      description: >-
        Per-weekday list of time blocks (keys `monday`…`sunday`). Each
        entry has `from` and `to` times (`HH:MM:SS`, with `24:00:00`
        allowed as end-of-day) plus an optional `data` payload.
        Existing blocks are replaced entirely.
      required: true
      selector:
        object:

set_schedule_events:
  name: Set Smart Schedule weekly events
  description: >-
    Replace the weekly point-in-time events of a Smart Schedule helper
    that is in events mode. Each event triggers the configured action
    (toggle / pulse / custom service) on the target entity.
  target:
    entity:
      integration: powerpilz_companion
      domain: select
  fields:
    events:
      name: Weekly events
      description: >-
        Per-weekday list of events (keys `monday`…`sunday`). Each entry
        has a `time` (`HH:MM:SS`) and an optional `data` payload.
        Existing events are replaced entirely.
      required: true
      selector:
        object:

trigger_event_now:
  name: Trigger Smart Schedule event now
  description: >-
    Manually fire the configured event action on a Smart Schedule helper
    that is in events mode. Works in both Auto and Off modes. A trigger
    arriving while a pulse is running (or within its 10-second cool-down)
    is silently dropped.
  target:
    entity:
      integration: powerpilz_companion
      domain: select

set_curve_points:
  name: Set Smart Curve weekly points
  description: >-
    Replace the weekly curve points of a Smart Curve helper. Used
    primarily by the PowerPilz Heating Curve card.
  target:
    entity:
      integration: powerpilz_companion
      domain: select
  fields:
    points:
      name: Weekly points
      description: >-
        Per-weekday list of curve points (keys `monday`…`sunday`). Each
        entry has a `time` (`HH:MM:SS`) and a numeric `value` (float).
        Existing points are replaced entirely.
      required: true
      selector:
        object:
